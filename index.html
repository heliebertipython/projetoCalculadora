<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto Calculadora</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body class="h-dvh grid grid-cols-3 grid-rows-2">
    <aside
      class="row-span-2 bg-emerald-300 flex flex-col justify-between py-5 px-2"
    >
      <h1 class="text-2xl font-bold px-6 py-2">Calculadora de Investimentos</h1>

      <form class="w-full" id="investment-form">
        <!--! Investimento Inicial -->
        <div class="flex w-full flex-col px-1 my-2">
          <label for="stating-amount" class="font-bold text-gray-700"
            >Investimento Inicial</label
          >
          <div class="flex">
            <input
              type="text"
              value="R$"
              disabled
              class="w-1/6 text-center bg-emerald-200 rounded-l-lg"
            />
            <input
              id="starting-amount"
              type="text"
              required
              placeholder="0.00"
              class="w-5/6 bg-white rounded-r-lg px-2"
            />
          </div>
        </div>

        <!--! Aportes Adicionais -->
        <div class="flex w-full flex-col px-1 my-2">
          <label for="additional-contribution" class="font-bold text-gray-700"
            >Aportes Adicionais</label
          >
          <div class="flex">
            <input
              type="text"
              value="R$"
              disabled
              class="w-1/6 text-center bg-emerald-200 rounded-l-lg"
            />
            <input
              id="additional-contribution"
              type="text"
              placeholder="0.00"
              class="w-5/6 bg-white rounded-r-lg px-2"
            />
          </div>
        </div>

        <!--! Prazo -->
        <div class="flex w-full flex-col px-1 my-2">
          <label for="time-amount" class="font-bold text-gray-700">Prazo</label>
          <div class="flex">
            <input
              id="time-amount"
              type="text"
              required
              placeholder="0"
              class="w-4/6 bg-white rounded-l-lg px-2"
            />
            <select
              name=""
              id="time-amount-period"
              class="w-2/6 rounded-r-lg bg-white text-center border-l-2 border-emerald-600 hover:bg-emerald-950 hover:text-slate-200"
            >
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
        </div>

        <!--! Rentabilidade -->
        <div class="flex w-full flex-col px-1 my-2">
          <label for="retunr-rate" class="font-bold text-gray-700"
            >Rentabilidade</label
          >
          <div class="flex">
            <input
              type="text"
              value="%"
              disabled
              class="w-1/6 text-center bg-emerald-200 rounded-l-lg"
            />
            <input
              id="retunr-rate"
              type="text"
              required
              placeholder="0"
              class="w-1/2 px-2 bg-white"
            />
            <select
              name=""
              id="evaluation-period"
              class="w-1/3 rounded-r-lg bg-white text-center border-l-2 border-emerald-600 hover:bg-emerald-950 hover:text-slate-200"
            >
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
        </div>

        <!--! Impostos sobre lucro -->
        <div class="flex w-full flex-col px-1 my-2">
          <label for="tax-rate" class="font-bold text-gray-700"
            >Impostos sobre lucro</label
          >
          <div class="flex">
            <input
              type="text"
              value="%"
              disabled
              class="w-1/6 text-center bg-emerald-200 rounded-l-lg"
            />
            <input
              id="tax-rate"
              type="text"
              required
              placeholder="0"
              class="w-5/6 bg-white rounded-r-lg px-2"
            />
          </div>
        </div>
      </form>

      <div class="flex h-12 px-6 my-8 w-full gap-2">
        <button
          id="calculate-results"
          form="investment-form"
          class="w-1/2 rounded-lg bg-emerald-950 text-slate-200 hover:bg-emerald-800"
        >
          Calcular
        </button>

        <button class="w-1/2 rounded-lg hover:bg-emerald-500">Limpar</button>
      </div>
    </aside>

    <main>
      <p>Resultados</p>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
